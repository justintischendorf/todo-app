version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: todo-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: todo-redis
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: todo-api
    platform: linux/arm64
    command: ["./wait-for-it.sh", "postgres", "--", "bun", "run", "rest"]
    environment:
      DATABASE_URL: postgresql://postgres:5432/postgres
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis

  worker:
    build: .
    container_name: todo-worker
    platform: linux/arm64
    command: ["./wait-for-it.sh", "postgres", "--", "bun", "run", "worker"]
    environment:
      DATABASE_URL: postgresql://postgres:5432/postgres
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis

volumes:
  pgdata: